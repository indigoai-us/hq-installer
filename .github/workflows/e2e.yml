name: e2e

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Cancel in-flight runs on the same PR when a new push lands — faster
# signal on PRs that rev quickly.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-macos:
    name: macOS e2e (tauri-driver + wdio)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build debug Tauri binary
        run: pnpm tauri build --debug
        env:
          # Skip bundling — we only need the raw binary for tauri-driver.
          TAURI_SKIP_DEVSERVER_CHECK: "true"

      - name: Run e2e tests
        run: pnpm e2e
        env:
          CI: "true"

      - name: Upload wdio logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-logs
          path: |
            e2e/logs
            /tmp/hq-installer-e2e-*
          retention-days: 7
